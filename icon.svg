<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="phoneGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="monitorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Phone body -->
  <rect x="64" y="120" width="140" height="272" rx="28" ry="28" fill="url(#phoneGrad)" stroke="#3b82f6" stroke-width="6"/>
  <!-- Phone screen -->
  <rect x="80" y="148" width="108" height="216" rx="4" ry="4" fill="#0f172a"/>
  <!-- Phone screen content: subtle lines -->
  <rect x="92" y="168" width="84" height="6" rx="3" fill="#1e293b"/>
  <rect x="92" y="186" width="64" height="6" rx="3" fill="#1e293b"/>
  <rect x="92" y="204" width="76" height="6" rx="3" fill="#1e293b"/>
  <rect x="92" y="222" width="56" height="6" rx="3" fill="#1e293b"/>
  <rect x="92" y="240" width="68" height="6" rx="3" fill="#1e293b"/>
  <rect x="92" y="258" width="60" height="6" rx="3" fill="#1e293b"/>
  <!-- Phone home indicator -->
  <rect x="105" y="378" width="58" height="4" rx="2" fill="#475569"/>

  <!-- Arcing connection arrow from phone to monitor -->
  <path d="M 204 236 C 260 160, 280 160, 336 180" fill="none" stroke="url(#arrowGrad)" stroke-width="8" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="336,180 320,172 324,190" fill="#06b6d4"/>

  <!-- Monitor body -->
  <rect x="308" y="100" width="160" height="200" rx="12" ry="12" fill="url(#monitorGrad)" stroke="#3b82f6" stroke-width="6"/>
  <!-- Monitor screen -->
  <rect x="320" y="114" width="136" height="172" rx="4" ry="4" fill="#0f172a"/>
  <!-- Monitor screen content -->
  <rect x="334" y="136" width="108" height="8" rx="4" fill="#1e293b"/>
  <rect x="334" y="156" width="88" height="8" rx="4" fill="#1e293b"/>
  <rect x="334" y="176" width="100" height="8" rx="4" fill="#1e293b"/>
  <rect x="334" y="196" width="72" height="8" rx="4" fill="#1e293b"/>
  <rect x="334" y="216" width="92" height="8" rx="4" fill="#1e293b"/>
  <!-- Monitor glow reflection -->
  <rect x="430" y="114" width="26" height="172" rx="4" fill="url(#arrowGrad)" opacity="0.06"/>

  <!-- Monitor stand -->
  <rect x="358" y="300" width="60" height="10" rx="3" fill="#475569"/>
  <rect x="368" y="310" width="40" height="30" rx="2" fill="#334155"/>
  <!-- Monitor base -->
  <rect x="340" y="340" width="96" height="8" rx="4" fill="#475569"/>

  <!-- Small glow dots along the arrow path -->
  <circle cx="230" cy="210" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="260" cy="190" r="2" fill="#3b82f6" opacity="0.3"/>
  <circle cx="290" cy="180" r="2.5" fill="#06b6d4" opacity="0.4"/>
</svg>
